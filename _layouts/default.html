<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Aliwan Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a84ff;
            --primary-dark: #0066cc;
            --bg: #050505;
            --card-bg: #111;
            --text: #f5f5f5;
            --text-muted: #a0a0a0;
            --accent: #5e5ce6;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Hero Section */
        .hero {
            padding: 8rem 0 4rem;
            text-align: center;
            background: radial-gradient(circle at 50% -10%, var(--accent), transparent 60%);
        }

        .hero-badge {
            display: inline-block;
            background: var(--glass);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        /* Buttons */
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3);
        }

        .btn-outline {
            border: 1px solid var(--border);
            color: white;
            background: var(--glass);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Section Titles */
        .section-title {
            font-size: 2rem;
            text-align: center;
            margin: 4rem 0 3rem;
        }

        /* Apps Grid */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        .app-card h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .app-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .app-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Glass Card */
        .card.glass {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            margin: 4rem 0;
        }

        /* Contact Section */
        .contact-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 4rem;
        }

        .contact-methods {
            display: flex;
            justify-content: center;
            gap: 4rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .contact-item .label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-item .value {
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-item a.value:hover {
            color: var(--primary);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 1s ease-out;
        }

        .slide-up {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            padding: 4rem 0;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .hero-actions { flex-direction: column; }
            .contact-methods { gap: 2rem; }
        }
    </style>
</head>
<body>
    {{ content }}

    <footer class="container">
        <p>&copy; 2026 Aliwan Dev. Building with passion in Indonesia.</p>
    </footer>
</body>
</html>
